<!DOCTYPE html>
<html>
<head>
    <title>UniEvent - University Events</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4">Official University Events</h1>
        <div class="row">
            {% for event in events %}
            <div class="col-md-4 mb-4">
                <div class="card h-100 shadow-sm">
                    <img src="{{ event.images[0].url }}" class="card-img-top" alt="Event Poster" style="height: 200px; object-fit: cover;">
                    <div class="card-body">
                        <h5 class="card-title">{{ event.name }}</h5>
                        <p class="card-text text-muted">{{ event.dates.start.localDate }}</p>
                        <p class="card-text">{{ event.classifications[0].segment.name }}</p>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</body>
</html>
